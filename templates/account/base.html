{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Account{% endblock %} · SmashFat BioLabs</title>
<style>
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .aw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0e1116}
  .ac{width:100%;max-width:380px;background:#171b22;border:1px solid #262c36;border-radius:14px;padding:28px 26px;color:#e6e9ef;box-shadow:0 10px 40px rgba(0,0,0,.4)}
  .ac h1{font-size:19px;margin:0 0 6px}
  .ac p{color:#9aa4b2;font-size:13.5px;line-height:1.5}
  .ac label{display:block;font-size:12px;color:#9aa4b2;margin:14px 0 5px}
  .ac input{width:100%;box-sizing:border-box;padding:10px 12px;border-radius:8px;border:1px solid #2c333f;background:#0e1116;color:#e6e9ef;font-size:14px}
  .ac button{width:100%;margin-top:18px;padding:11px;border:0;border-radius:8px;background:#2f6df6;color:#fff;font-weight:600;font-size:14px;cursor:pointer}
  .ac a{color:#8fb6ff;text-decoration:none}
  .ac .badge{display:inline-block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#7f8a99;border:1px solid #2c333f;border-radius:999px;padding:3px 9px;margin-bottom:14px}
  .ac .err{background:#3a1d22;border:1px solid #6b2a33;color:#ffb4bd;font-size:13px;border-radius:8px;padding:9px 11px;margin:10px 0}
  .ac .foot{margin-top:16px;font-size:12.5px}
  .ac ul.errorlist{color:#ffb4bd;font-size:12.5px;padding-left:18px}
</style>
</head>
<body>
<div class="aw">
  <div class="ac">
    <span class="badge">SmashFat BioLabs</span>
    <h1>{% block h1 %}{% endblock %}</h1>
    {% block content %}{% endblock %}
  </div>
</div>
</body>
</html>
