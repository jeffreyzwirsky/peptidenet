{% extends "account/base.html" %}
{% block title %}Reset password{% endblock %}
{% block h1 %}Reset your password{% endblock %}
{% block content %}
<p>Enter the email on your account and we'll send a link to set a new password.</p>
<form method="post" action="">
  {% csrf_token %}
  <label for="id_email">Email</label>
  <input id="id_email" type="email" name="email" autocomplete="email" autofocus required>
  <button type="submit">Send reset link</button>
</form>
<p class="foot"><a href="/portal/">← Back to sign in</a></p>
{% endblock %}
