<div class="age-gate" data-age-gate>
  <div class="age-box">
    <p class="eyebrow">Research Use Access</p>
    <h2>Age verification required</h2>
    <p class="age-copy">This website contains research-use-only products and information.
      Please confirm you are at least 21 years old before entering.</p>
    <label class="age-check">
      <input type="checkbox" data-age-check>
      <span>I confirm that I am 21 years of age or older and understand that products on this
      website are intended strictly for laboratory research use only.</span>
    </label>
    <button class="btn btn-primary" data-age-enter disabled>Access site</button>
    <a class="age-exit" href="https://www.google.com">Exit</a>
  </div>
</div>
