<div class="cart-overlay" data-cart-overlay></div>
<aside class="cart-drawer" data-cart-drawer aria-label="Cart">
  <div class="cart-head">
    <h3>Your cart</h3>
    <button class="cart-close" data-cart-close aria-label="Close">×</button>
  </div>
  <div class="cart-body" data-cart-body></div>
  <div class="cart-foot">
    <div class="cart-subtotal"><span>Subtotal</span><span data-cart-total>$0.00</span></div>
    <form data-checkout-form>
      <input type="text" name="company_website" tabindex="-1" autocomplete="off" class="ai-hp" aria-hidden="true">
      <input name="name" placeholder="Name" required>
      <input name="email" type="email" placeholder="Email for order" required>
      <button type="submit" class="btn btn-primary btn-checkout">Checkout</button>
    </form>
    <p class="cart-note">Free express shipping over $200 · For research use only</p>
  </div>
</aside>
